spring.application.name=weather-service

spring.datasource.url=jdbc:mysql://localhost:3306/weather_service
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=5m

spring.security.user.name=nikhil
spring.security.user.password=${APP_USER_PASSWORD}